<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smash Hit Remake - Diagnóstico</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div id="ui">ESFERAS: <span id="ball-count">25</span></div>
    
    <!-- Painel de debug direto no HTML para não depender do JS externo -->
    <div id="debug" style="position: absolute; top: 60px; left: 20px; color: #00ff00; font-family: monospace; font-size: 14px; z-index: 100;">
        Verificando carregamento...
    </div>

    <!-- Script de diagnóstico em tempo real -->
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const debugDiv = document.getElementById('debug');
            debugDiv.innerHTML = "• HTML carregado.<br>• Aguardando inicialização do Three.js...";
            console.log("HTML carregado com sucesso. Verificando scripts...");
        });

        // Captura qualquer erro global que aconteça na página e mostra na tela
        window.onerror = function(message, source, lineno, colno, error) {
            const debugDiv = document.getElementById('debug');
            debugDiv.style.color = '#ff0000';
            debugDiv.innerHTML = `<b>ERRO DETECTADO:</b><br>${message}<br>em: ${source}:${lineno}`;
            return false;
        };
    </script>

    <!-- Importmap do Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <!-- Chamada do script principal -->
    <script type="module" src="./main.js"></script>

</body>
</html>
